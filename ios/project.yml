name: Familiar
options:
  bundleIdPrefix: app.familiar
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Familiar:
    type: application
    platform: iOS
    sources:
      - path: Familiar
        excludes:
          - Familiar.entitlements
          - Resources
    resources:
      - path: Familiar/Resources/Assets.xcassets
    entitlements:
      path: Familiar/Familiar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.familiar.ios
        PRODUCT_NAME: Familiar
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Familiar
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Familiar/Familiar.entitlements
    dependencies:
      - target: FamiliarWidgetExtension
        embed: true
  FamiliarWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: FamiliarWidget
        excludes:
          - FamiliarWidget.entitlements
          - Info.plist
          - Resources
      - path: Familiar/Shared
      - path: Familiar/Domain/FamiliarStyle.swift
      - path: Familiar/Intents/PetActionIntent.swift
    resources:
      - path: FamiliarWidget/Resources/Assets.xcassets
    info:
      path: FamiliarWidget/Info.plist
    entitlements:
      path: FamiliarWidget/FamiliarWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.familiar.ios.widget
        PRODUCT_NAME: FamiliarWidget
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: FamiliarWidget/FamiliarWidget.entitlements
schemes:
  Familiar:
    build:
      targets:
        Familiar: all
        FamiliarWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
